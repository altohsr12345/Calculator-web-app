<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Varela+Round&display=swap" rel="stylesheet">
    <title>Calculator App</title>
</head>
<body>
    <h1 id="result"></h1>


    <div id="ResultBox">
        <h1>results</h1>
    </div>
    <div id="CalcBox">
        <button id="1" class="numpad">1</button>
        <button id="2" class="numpad">2</button>
        <button id="3" class="numpad">3</button>
        <button id="+" class="numpad">+</button>
        <button id="4" class="numpad">4</button>
        <button id="5" class="numpad">5</button>
        <button id="6" class="numpad">6</button>
        <button id="-" class="numpad">-</button>
        <button id="7" class="numpad">7</button>
        <button id="8" class="numpad">8</button>
        <button id="9" class="numpad">9</button>
        <button id="x" class="numpad">x</button>
        <button id="c" class="numpad">C</button>
        <button id="0" class="numpad">0</button>
        <button id="=" class="numpad">=</button>
        <button id="/" class="numpad">/</button>
    </div>
</body>
</html>
