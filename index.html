<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Varela+Round&display=swap" rel="stylesheet">
    <title>Calculator App</title>
    <script src="script.js" defer></script>
</head>
<body>
    <h1 id="result"></h1>


    <div id="ResultBox">
        <h1> </h1>
    </div>
    <div id="CalcBox">
        <button id="1" class="digit">1</button>
        <button id="2" class="digit">2</button>
        <button id="3" class="digit">3</button>
        <button id="+" class="oper">+</button>
        <button id="4" class="digit">4</button>
        <button id="5" class="digit">5</button>
        <button id="6" class="digit">6</button>
        <button id="-" class="oper">-</button>
        <button id="7" class="digit">7</button>
        <button id="8" class="digit">8</button>
        <button id="9" class="digit">9</button>
        <button id="x" class="oper">x</button>
        <button id="c" class="clear">C</button>
        <button id="0" class="digit">0</button>
        <button id="=" class="equal">=</button>
        <button id="/" class="oper">/</button>
    </div>


    <h1 style="color:aliceblue"> a </h1>
</body>
</html>
